    <div class="brand"><div class="logo">K</div><div><div class="farm">Westwood Dairies</div><div class="who">Logged in: ${me.user}</div></div></div>
    ${drawerStruct.map(g=>`<div class="grp">${g.grp}</div>${g.its.map(it=>`<div class="it ${active===it.id?'active':''}" onclick="navAndClose('${it.id}')"><i class="ti ${it.ic}" aria-hidden="true"></i><span>${it.l}</span>${it.b?`<span class="badge">${it.b}</span>`:""}</div>`).join("")}`).join("")}`;
}
window.openDrawer=()=>{drawer.classList.add("open");drawerback.classList.add("open")};
window.closeDrawer=()=>{drawer.classList.remove("open");drawerback.classList.remove("open")};
window.navAndClose=id=>{closeDrawer();nav(id)};
window.nav=(id,push=true)=>{if(push&&active!==id)stack.push(active);active=id;setTabs();renderDrawer();render(id)};
window.goBack=()=>{if(stack.length){active=stack.pop();setTabs();renderDrawer();render(active)}else{nav("home",false)}};

function avFor(a){const i=a.name.split(" ").map(s=>s[0]).slice(0,2).join("");let c="";if(a.repro==="Calf")c="calf";else if(a.repro==="Bull")c="bull";else if(a.repro?.startsWith("Pregnant"))c="dry";return `<div class="av ${c}">${i}</div>`}
function pillFor(a){
  if(a.inTreatment)return `<span class="pill sick">In treatment</span>`;
  if(a.repro==="Lactating"||a.repro==="Fresh / Lactating")return `<span class="pill lact">${a.dim} DIM</span>`;
  if(a.repro==="Pregnant 8mo")return `<span class="pill dry-p">Steaming</span>`;
  if(a.repro==="Pregnant 5mo")return `<span class="pill preg">In-calf</span>`;
  if(a.repro==="Calf")return `<span class="pill calf-p">Calf</span>`;
  if(a.repro==="Heifer / served")return `<span class="pill preg">Served</span>`;
  if(a.repro==="Heifer")return `<span class="pill heif">Heifer</span>`;
  if(a.repro==="Bull")return `<span class="pill">Bull</span>`;
  return "";
}

function aRows(f,q){
  let l=animals;
  if(f!=="all")l=l.filter(a=>(a.repro||"").includes(f));
  if(q)l=l.filter(a=>a.id.toLowerCase().includes(q.toLowerCase())||a.name.toLowerCase().includes(q.toLowerCase()));
  if(!l.length)return `<div class="empty"><i class="ti ti-search-off empty-icon" aria-hidden="true"></i><div>No animals match</div></div>`;
  return l.map(a=>`<div class="row" onclick="aDetail('${a.id}')">${avFor(a)}<div class="row-main"><p class="row-name">${a.name} <span style="color:var(--color-text-tertiary);font-weight:400;font-size:11px">${a.id}</span></p><p class="row-meta">${a.herd} · ${a.lastWt} kg</p></div>${pillFor(a)}</div>`).join("");
}
window.filterA=q=>document.getElementById("alist").innerHTML=aRows(window._cf||"all",q);
window.chipA=(el,f)=>{document.querySelectorAll(".chips .chip").forEach(c=>c.classList.remove("active"));el.classList.add("active");window._cf=f;document.getElementById("alist").innerHTML=aRows(f,"")};

function rCalfFeed(){
  const calf=animals.find(a=>a.repro==="Calf");
  const ageDays=Math.floor((new Date()-new Date(calf.dob))/(1000*60*60*24));
  let rec,ft,phase,formula,item,wh;
  if(ageDays<=1){rec=(calf.lastWt*0.10/2).toFixed(1);ft="Colostrum";phase="Day 1 — first feed within 6h";formula="10% birth weight ÷ 2";item="Colostrum (kg)";wh="Stores - WDL"}
  else if(ageDays<=5){rec=(calf.lastWt*0.05/2).toFixed(1);ft="Transitional Milk";phase="Days 2-5";formula="5% body weight ÷ 2";item="WestWood Dairy Milk (kg)";wh="Finished Goods - WDL"}
  else if(ageDays<=60){rec=(calf.lastWt*0.10/2).toFixed(1);ft="Whole Milk";phase="Pre-weaning";formula="10% body weight ÷ 2";item="WestWood Dairy Milk (kg)";wh="Finished Goods - WDL"}
  else if(ageDays<=90){const tp=1-((ageDays-60)/30);rec=(calf.lastWt*0.10*tp/2).toFixed(1);ft="Whole Milk";phase="Weaning taper";formula="Tapering linearly to day 90";item="WestWood Dairy Milk (kg)";wh="Finished Goods - WDL"}
  else{rec="0";ft="Starter Feed";phase="Weaned";formula="Whole milk feeding ended";item="Calf starter pellets";wh="Stores - WDL"}
  setBar("Calf feeding",calf.name);
  body.innerHTML=`
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px"><div class="av calf" style="width:42px;height:42px">${calf.name.split(" ").map(s=>s[0]).slice(0,2).join("")}</div><div style="flex:1"><p style="margin:0;font-size:13px;font-weight:500">${calf.name}</p><p style="margin:2px 0 0;font-size:11px;color:var(--color-text-secondary)">${ageDays} days · ${calf.lastWt} kg · ${calf.herd}</p></div><button class="btn-link" onclick="pickerSheet({mode:'single',title:'Switch calf',include:a=>a.repro==='Calf',onPick:a=>nav('ev_feed')})">Switch</button></div>
    <div class="calc"><p class="calc-l">Recommended · ${phase}</p><p class="calc-num">${rec} kg ${ft}</p><p class="calc-f">${formula} · per Livestock Settings</p></div>
    <div class="field"><label class="field-label">Feed type</label><select id="cf_type" onchange="cfTypeChange()"><option ${ft==="Colostrum"?"selected":""}>Colostrum</option><option ${ft==="Transitional Milk"?"selected":""}>Transitional Milk</option><option ${ft==="Whole Milk"?"selected":""}>Whole Milk</option><option>Milk Replacer</option><option>Starter Feed</option></select></div>
    <div class="field"><label class="field-label">Feed item (stock)</label><select id="cf_item"><option>${item}</option><option>WestWood Dairy Milk (kg)</option><option>Colostrum (kg)</option><option>Calf starter pellets</option><option>Milk Replacer (Hi-Pro)</option></select><p class="field-help">Must be a stock item. Issued from source warehouse.</p></div>
    <div class="field-row">
      <div class="field"><label class="field-label">Source warehouse</label><select><option>${wh}</option><option>Stores - WDL</option><option>Finished Goods - WDL</option></select></div>
      <div class="field"><label class="field-label">Session</label><div class="chips" style="margin:0"><span class="chip active">AM</span><span class="chip">PM</span></div></div>
    </div>
    <div class="field"><label class="field-label">Quantity fed (kg)</label><input type="number" step="0.1" value="${rec}" /></div>
    <div class="field"><label class="field-label">Remarks (optional)</label><textarea rows="2" placeholder="Optional notes"></textarea></div>
    <button class="btn" onclick="afterSubmit('Calf feeding')">Submit</button>`;
}

let pickerState={mode:"single",selected:new Set(),title:"",include:()=>true,emptyAction:null,onPick:null,view:"all"};
window.pickerSheet=(opts)=>{
  pickerState={mode:opts.mode||"single",selected:new Set(),title:opts.title||"Select",include:opts.include||(()=>true),emptyAction:opts.emptyAction||null,onPick:opts.onPick||null,view:"all",query:""};
  renderPicker();
};
function renderPicker(){
  const list=animals.filter(pickerState.include).filter(a=>!pickerState.query||a.name.toLowerCase().includes(pickerState.query.toLowerCase())||a.id.toLowerCase().includes(pickerState.query.toLowerCase()));
  const allSelected=list.length>0&&list.every(a=>pickerState.selected.has(a.id));
  const herdGroups={};
  list.forEach(a=>{(herdGroups[a.herd]=herdGroups[a.herd]||[]).push(a)});
  const content=`
    <div class="picker-tabs">
      <button class="${pickerState.view==='all'?'active':''}" onclick="pickerSetView('all')">Search</button>
      <button class="${pickerState.view==='herd'?'active':''}" onclick="pickerSetView('herd')">By herd</button>
    </div>
    ${pickerState.view==='all'?`
      <div class="search"><i class="ti ti-search" aria-hidden="true"></i><input type="text" placeholder="Tag or name" oninput="pickerQuery(this.value)" value="${pickerState.query||''}" autofocus /></div>
      ${list.length===0?`<div class="empty"><i class="ti ti-search-off empty-icon" aria-hidden="true"></i><div>No animals match</div>${pickerState.emptyAction?`<button class="tag-add" style="margin-top:10px" onclick="pickerEmptyAction()"><i class="ti ti-plus" aria-hidden="true"></i> ${pickerState.emptyAction.label}</button>`:""}</div>`:""}
      ${pickerState.mode==='multi'&&list.length>0?`<div class="sel-row" onclick="pickerToggleAll()" style="font-weight:500"><div class="cb ${allSelected?'checked':''}">${allSelected?'<i class="ti ti-check" aria-hidden="true"></i>':''}</div><span>Select all (${list.length})</span></div>`:""}
      ${list.map(a=>`<div class="sel-row" onclick="pickerToggle('${a.id}')">${pickerState.mode==='multi'?`<div class="cb ${pickerState.selected.has(a.id)?'checked':''}">${pickerState.selected.has(a.id)?'<i class="ti ti-check" aria-hidden="true"></i>':''}</div>`:""}${avFor(a)}<div class="row-main"><p class="row-name">${a.name}</p><p class="row-meta">${a.id} · ${a.herd}</p></div>${pillFor(a)}</div>`).join("")}
    `:`
      ${Object.entries(herdGroups).map(([herd,arr])=>{
        const selectedInHerd=arr.filter(a=>pickerState.selected.has(a.id)).length;
        const allInHerd=selectedInHerd===arr.length;
        return `<div style="margin-bottom:14px">
          <div class="sel-row" onclick="pickerToggleHerd('${herd}')" style="font-weight:500">
            ${pickerState.mode==='multi'?`<div class="cb ${allInHerd?'checked':selectedInHerd>0?'checked':''}" style="${selectedInHerd>0&&!allInHerd?'background:var(--color-background-info);border-color:var(--color-text-info)':''}">${allInHerd?'<i class="ti ti-check" aria-hidden="true"></i>':selectedInHerd>0?'<i class="ti ti-minus" style="font-size:10px;color:var(--color-text-info)" aria-hidden="true"></i>':""}</div>`:""}
            <i class="ti ti-fence" style="color:var(--color-text-secondary)" aria-hidden="true"></i><span>${herd}</span><span style="margin-left:auto;font-size:11px;color:var(--color-text-secondary);font-weight:400">${arr.length} head</span>
          </div>
          ${arr.map(a=>`<div class="sel-row" style="padding-left:24px" onclick="pickerToggle('${a.id}')">${pickerState.mode==='multi'?`<div class="cb ${pickerState.selected.has(a.id)?'checked':''}">${pickerState.selected.has(a.id)?'<i class="ti ti-check" aria-hidden="true"></i>':''}</div>`:""}${avFor(a)}<div class="row-main"><p class="row-name">${a.name}</p><p class="row-meta">${a.id} · ${a.lastWt} kg</p></div>${pillFor(a)}</div>`).join("")}
        </div>`;
      }).join("")}
    `}
    ${pickerState.mode==='multi'?`
      <div class="summary-bar" style="position:sticky;bottom:0">
        <span><b>${pickerState.selected.size}</b> selected</span>
        <button class="btn" style="width:auto;padding:8px 16px;margin:0" onclick="pickerConfirm()">Confirm</button>
      </div>
    `:""}`;
  modalHost.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeSheet()"><div class="sheet"><div class="handle"></div><div class="sheet-h"><p class="sheet-t">${pickerState.title}</p><button class="icon-btn" onclick="closeSheet()" aria-label="Close"><i class="ti ti-x" aria-hidden="true"></i></button></div>${content}</div></div>`;
}
window.pickerSetView=v=>{pickerState.view=v;renderPicker()};
window.pickerQuery=q=>{pickerState.query=q;renderPicker()};
window.pickerToggle=id=>{
  if(pickerState.mode==='single'){const a=animals.find(x=>x.id===id);closeSheet();if(pickerState.onPick)pickerState.onPick(a)}
  else{if(pickerState.selected.has(id))pickerState.selected.delete(id);else pickerState.selected.add(id);renderPicker()}
};
window.pickerToggleAll=()=>{
  const list=animals.filter(pickerState.include).filter(a=>!pickerState.query||a.name.toLowerCase().includes(pickerState.query.toLowerCase())||a.id.toLowerCase().includes(pickerState.query.toLowerCase()));
  const allSelected=list.length>0&&list.every(a=>pickerState.selected.has(a.id));
  if(allSelected)list.forEach(a=>pickerState.selected.delete(a.id));else list.forEach(a=>pickerState.selected.add(a.id));
  renderPicker();
};
window.pickerToggleHerd=h=>{
  const arr=animals.filter(a=>a.herd===h&&pickerState.include(a));
  const all=arr.every(a=>pickerState.selected.has(a.id));
  if(all)arr.forEach(a=>pickerState.selected.delete(a.id));else arr.forEach(a=>pickerState.selected.add(a.id));
  renderPicker();
};
window.pickerConfirm=()=>{const list=Array.from(pickerState.selected).map(id=>animals.find(a=>a.id===id)).filter(Boolean);closeSheet();if(pickerState.onPick)pickerState.onPick(list)};
window.pickerEmptyAction=()=>{if(pickerState.emptyAction&&pickerState.emptyAction.cb)pickerState.emptyAction.cb()};
